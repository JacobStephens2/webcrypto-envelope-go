name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [oldstable, stable]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false # zero dependencies - no go.sum to key a cache on
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
